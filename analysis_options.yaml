# BookMyJuice Flutter Analysis Options
# 
# Defines linting rules and analyzer configuration
# Based on flutter_lints with additional strict rules

include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # Error Rules
    - avoid_empty_else
    - avoid_relative_lib_imports
    - avoid_returning_null_for_future
    - avoid_types_as_parameter_names
    - cancel_subscriptions
    - close_sinks
    - empty_statements
    - hash_and_equals
    - collection_methods_unrelated_type
    - literal_only_boolean_expressions
    - no_adjacent_strings_in_list
    - prefer_is_empty
    - prefer_is_not_empty
    - prefer_typing_uninitialized_variables
    - throw_in_finally
    - unnecessary_statements
    - unrelated_type_equality_checks
    - valid_regexps

    # Style Rules
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - prefer_final_fields
    - avoid_print
    - avoid_unnecessary_containers
    - prefer_single_quotes
    - require_trailing_commas
    - sort_child_properties_last
    - use_key_in_widget_constructors
    - prefer_const_declarations
    - prefer_final_locals
    - avoid_init_to_null
    - avoid_null_checks_in_equality_operators
    - avoid_redundant_argument_values
    - avoid_unused_constructor_parameters
    - prefer_is_not_operator
    - unnecessary_null_in_if_null_operators
    - unnecessary_this
    - cascade_invocations
    - prefer_constructors_over_static_methods
    - prefer_mixin

    # Design Rules
    - one_member_abstracts
    - prefer_abstract_classes
    - avoid_classes_with_only_static_members
    - prefer_final_in_for_each
    - unnecessary_await_in_return
    - unnecessary_lambdas
    - unnecessary_null_aware_assignments
    - unnecessary_null_checks
    - unnecessary_nullable_for_final_variable_declarations
    - unnecessary_parenthesis
    - unnecessary_string_escapes
    - unnecessary_string_interpolations
    - use_decorated_box
    - use_named_constants
    - use_raw_strings

    # Documentation Rules (Optional - Enable if needed)
    # - comment_references
    # - provide_deprecation_message

    # Performance Rules
    - avoid_slow_async_io
    - prefer_spread_collections

analyzer:
  # Exclude generated files
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - "**/generated/**"
  
  # Treat specific errors as hints/warnings
  errors:
    invalid_annotation_target: ignore
    missing_required_param: error
    missing_return: error
    todo: ignore
  
  # Enable strict language features
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  # Strong mode
  strong-mode:
    implicit-casts: false
    implicit-dynamic: false
