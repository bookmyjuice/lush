name: lush
description: BookMyJuice - Cold-pressed juice subscription and ordering platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.1
  bloc: ^9.0.0
  equatable: ^2.0.5
  flutter_bloc: ^9.0.0
  cupertino_icons: ^1.0.5
  shared_preferences: ^2.0.17
  hexcolor: ^3.0.1
  pin_input_text_field: ^4.2.0
  google_sign_in: ^7.1.0
  font_awesome_flutter: ^11.0.0
  flutter_facebook_auth: ^7.0.1
  google_fonts: ^8.0.2
  provider: ^6.0.5
  no_context_navigation: ^3.0.0
  flutter_pw_validator: ^1.5.0
  razorpay_flutter: ^1.3.0
  fluttertoast: ^9.0.0
  duration_button: ^1.0.0
  get_it: ^9.2.1
  toastification: ^3.0.1
  webview_flutter: ^4.10.0
  carousel_slider: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  toggle_switch: ^2.3.0
  url_launcher: ^6.3.1
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  rive: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  
  # Testing Frameworks - Compatible versions
  bloc_test: ^10.0.0
  mocktail: ^1.0.3
  patrol: ^4.5.0
  
  # Code Quality
  flutter_lints: ^6.0.0
  very_good_analysis: ^10.2.0
  
  # Code Generation
  build_runner: ^2.4.9
  
  # Test Organization
  test: ^1.25.7
  patrol_cli: ^4.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/application.properties

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/bmjlogoSquare.png"


  
  
  
  
  
  
  
  
  
  
